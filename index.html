<!DOCTYPE html>
<html lang="fr" data-theme="beige">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Playfair+Display:wght@600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ── CSS VARIABLES ── */
  :root[data-theme="beige"] {
    --bg:        #f5f0e8;
    --bg2:       #ede7d9;
    --surface:   #faf7f2;
    --border:    #d4c9b0;
    --text:      #2c2416;
    --muted:     #8a7a5e;
    --accent:    #e8740c;
    --accent2:   #c45e00;
    --tag:       #f3ead8;
    --shadow:    rgba(100,70,20,0.12);
    --font-head: 'Playfair Display', serif;
    --font-mono: 'Space Mono', monospace;
    --dot:       #e8740c;
  }
  :root[data-theme="mil"] {
    --bg:        #1a1e10;
    --bg2:       #232a16;
    --surface:   #1e2512;
    --border:    #3d4a20;
    --text:      #b8c490;
    --muted:     #6a7a42;
    --accent:    #8aad2e;
    --accent2:   #6b8a1e;
    --tag:       #2a3318;
    --shadow:    rgba(0,0,0,0.4);
    --font-head: 'Share Tech Mono', monospace;
    --font-mono: 'Share Tech Mono', monospace;
    --dot:       #8aad2e;
  }

  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 17px;
    letter-spacing: .04em;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dot);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:.4; transform:scale(.7); }
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .theme-btn {
    padding: 5px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: var(--muted);
    letter-spacing: .05em;
    transition: background .2s, color .2s;
  }
  .theme-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* ── SEARCH ── */
  .search-wrap {
    padding: 14px 20px 10px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .search-input {
    flex: 1;
    max-width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 3px;
    outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .stat {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  .stat span { color: var(--accent); }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
    padding: 10px 20px 30px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    transition: border-color .15s, transform .12s, box-shadow .15s;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform .15s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px var(--shadow);
  }
  .card:hover::after { transform: scaleY(1); }

  .card-icon {
    font-size: 22px;
    flex-shrink: 0;
    line-height: 1;
  }

  .card-body { flex: 1; min-width: 0; }

  .card-name {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  [data-theme="mil"] .card-name { font-family: var(--font-mono); text-transform: uppercase; font-size: 11px; letter-spacing: .1em; }

  .card-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-tag {
    display: inline-block;
    margin-top: 6px;
    padding: 2px 6px;
    background: var(--tag);
    border: 1px solid var(--border);
    font-size: 9px;
    letter-spacing: .06em;
    color: var(--muted);
    border-radius: 2px;
    text-transform: uppercase;
  }
  [data-theme="mil"] .card-tag { border-color: var(--accent2); color: var(--accent); }

  /* ── SECTION LABEL ── */
  .section-label {
    grid-column: 1 / -1;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 6px 0 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  [data-theme="mil"] .section-label { color: var(--accent); }

  /* ── STATUS / EMPTY ── */
  .status {
    grid-column: 1/-1;
    text-align: center;
    color: var(--muted);
    padding: 40px;
    font-size: 12px;
  }
  .status .accent { color: var(--accent); }

  /* ── FOOTER ── */
  footer {
    padding: 10px 20px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    letter-spacing: .05em;
  }

  /* ── MIL SCANLINE overlay ── */
  [data-theme="mil"] body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.06) 2px,
      rgba(0,0,0,.06) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ── REFRESH BTN ── */
  .btn-refresh {
    background: var(--tag);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
    letter-spacing: .05em;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

  /* ── SPIN ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { display: inline-block; animation: spin .8s linear infinite; }
</style>
</head>
<body>

<header>
  <div class="logo" id="logo-text">LAUNCHER</div>
  <div class="header-right">
    <div class="theme-toggle">
      <button class="theme-btn active" onclick="setTheme('beige')" id="btn-beige">BEIGE</button>
      <button class="theme-btn" onclick="setTheme('mil')" id="btn-mil">MIL</button>
    </div>
  </div>
</header>

<div class="search-wrap">
  <input class="search-input" type="text" id="search" placeholder="Rechercher..." oninput="filterCards()">
  <button class="btn-refresh" onclick="loadRepo()" id="btn-refresh">↻ Actualiser</button>
  <div class="stat" id="stat">—</div>
</div>

<div class="grid" id="grid">
  <div class="status"><span class="accent">⟳</span> Chargement du répertoire…</div>
</div>

<footer>
  <span id="repo-info">bencm0i/HOM</span>
  <span id="last-fetch">—</span>
</footer>

<script>
// ── CONFIG ──
const OWNER = 'bencm0i';
const REPO  = 'HOM';
const BRANCH = 'main'; // ou 'master' — détection auto

// Extension → icône + label
const EXT_MAP = {
  html:  { icon: '🌐', tag: 'HTML' },
  htm:   { icon: '🌐', tag: 'HTML' },
  js:    { icon: '⚡', tag: 'JS' },
  css:   { icon: '🎨', tag: 'CSS' },
  json:  { icon: '📋', tag: 'JSON' },
  md:    { icon: '📝', tag: 'MD' },
  txt:   { icon: '📄', tag: 'TXT' },
  png:   { icon: '🖼', tag: 'IMG' },
  jpg:   { icon: '🖼', tag: 'IMG' },
  jpeg:  { icon: '🖼', tag: 'IMG' },
  svg:   { icon: '🔷', tag: 'SVG' },
  pdf:   { icon: '📕', tag: 'PDF' },
  csv:   { icon: '📊', tag: 'CSV' },
  xml:   { icon: '🔧', tag: 'XML' },
  py:    { icon: '🐍', tag: 'PY' },
  sh:    { icon: '💻', tag: 'SH' },
};
const DEFAULT_ICON = { icon: '📁', tag: 'FILE' };

// ── STATE ──
let allFiles = [];
let currentTheme = localStorage.getItem('launcher-theme') || 'beige';

// ── THEME ──
function setTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('launcher-theme', t);
  document.getElementById('btn-beige').classList.toggle('active', t === 'beige');
  document.getElementById('btn-mil').classList.toggle('active', t === 'mil');
  document.getElementById('logo-text').textContent = t === 'mil' ? '▣ LAUNCHER' : 'LAUNCHER';
}
setTheme(currentTheme);

// ── FETCH REPO ──
async function loadRepo(branch = BRANCH) {
  const btn = document.getElementById('btn-refresh');
  const inner = btn.innerHTML;
  btn.innerHTML = '<span class="spinning">↻</span>';
  btn.disabled = true;

  const grid = document.getElementById('grid');
  grid.innerHTML = '<div class="status"><span class="accent">⟳</span> Chargement…</div>';

  try {
    const url = `https://api.github.com/repos/${OWNER}/${REPO}/git/trees/${branch}?recursive=1`;
    const resp = await fetch(url, { headers: { Accept: 'application/vnd.github+json' } });

    if (!resp.ok) {
      // Essai sur master si main échoue
      if (branch === 'main') return loadRepo('master');
      throw new Error(`GitHub API ${resp.status}`);
    }

    const data = await resp.json();
    allFiles = (data.tree || []).filter(f => f.type === 'blob');

    renderGrid(allFiles);
    document.getElementById('last-fetch').textContent = 'Mis à jour : ' + new Date().toLocaleTimeString('fr-FR');
    document.getElementById('repo-info').textContent = `${OWNER}/${REPO} · ${branch} · ${allFiles.length} fichiers`;
    document.getElementById('stat').innerHTML = `<span>${allFiles.length}</span> fichiers`;
  } catch (e) {
    grid.innerHTML = `<div class="status">⚠ Erreur : ${e.message}</div>`;
  } finally {
    btn.innerHTML = inner;
    btn.disabled = false;
  }
}

// ── RENDER ──
function renderGrid(files) {
  const grid = document.getElementById('grid');
  if (!files.length) {
    grid.innerHTML = '<div class="status">Aucun fichier trouvé.</div>';
    return;
  }

  // Grouper par dossier
  const groups = {};
  files.forEach(f => {
    const parts = f.path.split('/');
    const dir = parts.length > 1 ? parts.slice(0, -1).join('/') : '(racine)';
    if (!groups[dir]) groups[dir] = [];
    groups[dir].push(f);
  });

  let html = '';
  Object.keys(groups).sort().forEach(dir => {
    html += `<div class="section-label">📂 ${dir}</div>`;
    groups[dir].sort((a, b) => a.path.localeCompare(b.path)).forEach(f => {
      const name = f.path.split('/').pop();
      const ext = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
      const { icon, tag } = EXT_MAP[ext] || DEFAULT_ICON;
      const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/HEAD/${f.path}`;
      const pageUrl = `https://${OWNER}.github.io/${REPO}/${f.path}`;
      // Pour HTML → ouvrir la page GitHub Pages, sinon raw
      const href = ext === 'html' || ext === 'htm' ? pageUrl : rawUrl;
      const size = f.size ? formatSize(f.size) : '';
      html += `
        <a class="card" href="${href}" target="_blank" rel="noopener" title="${f.path}">
          <div class="card-icon">${icon}</div>
          <div class="card-body">
            <div class="card-name">${name}</div>
            ${size ? `<div class="card-sub">${size}</div>` : ''}
            <div class="card-tag">${tag}</div>
          </div>
        </a>`;
    });
  });

  grid.innerHTML = html;
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' Ko';
  return (bytes/1024/1024).toFixed(1) + ' Mo';
}

// ── FILTER ──
function filterCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = q ? allFiles.filter(f => f.path.toLowerCase().includes(q)) : allFiles;
  document.getElementById('stat').innerHTML = `<span>${filtered.length}</span> / ${allFiles.length}`;
  renderGrid(filtered);
}

// ── INIT ──
loadRepo();
</script>
</body>
</html>
